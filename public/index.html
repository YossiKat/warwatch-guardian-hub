<!DOCTYPE html>
<html dir="rtl">
<head>
    <meta charset="UTF-8">
    <title>WARZONE CONTROL - LIGHT VERSION</title>
    <link rel="stylesheet" href="https://unpkg.com/leaflet/dist/leaflet.css" />
    <style>
        :root { --neon-green: #00ff9d; --bg-dark: #050505; }
        body { margin: 0; background: var(--bg-dark); color: #fff; font-family: system-ui, -apple-system, sans-serif; overflow: hidden; }
        #map { height: 100vh; width: 100vw; position: absolute; filter: brightness(0.7) contrast(1.2); }
        
        /* פאנל צדדי רזה ושקוף */
        #intel-sidebar { 
            position: absolute; top: 15px; right: 15px; bottom: 15px; width: 320px; 
            background: rgba(10, 12, 16, 0.85); backdrop-filter: blur(8px);
            border: 1px solid rgba(0, 255, 157, 0.3); z-index: 1000; border-radius: 8px;
            display: flex; flex-direction: column;
        }
        
        .header { padding: 15px; border-bottom: 1px solid rgba(0, 255, 157, 0.2); font-weight: bold; color: var(--neon-green); font-size: 14px; letter-spacing: 1px; }
        #feed { flex: 1; overflow-y: auto; padding: 10px; }
        .event-card { background: rgba(255, 255, 255, 0.05); padding: 10px; margin-bottom: 8px; border-right: 3px solid var(--neon-green); font-size: 13px; animation: fadeIn 0.3s; }
        @keyframes fadeIn { from { opacity: 0; transform: translateX(10px); } to { opacity: 1; transform: translateX(0); } }
        
        /* הסתרת באנרים ופקדים מיותרים */
        .leaflet-control-zoom, .leaflet-control-attribution { display: none !important; }
    </style>
</head>
<body>
    <div id="map"></div>
    <div id="intel-sidebar">
        <div class="header">📡 INTEL STREAM ACTIVE</div>
        <div id="feed"></div>
    </div>

    <script src="/socket.io/socket.io.js"></script>
    <script src="https://unpkg.com/leaflet/dist/leaflet.js"></script>
    <script>
        const socket = io();
        // טעינת מפה בסיסית בלבד ללא שכבות תנועה כבדות
        const map = L.map('map', { zoomControl: false, attributionControl: false }).setView([31.5, 34.75], 8);
        L.tileLayer('https://{s}.basemaps.cartocdn.com/dark_all/{z}/{x}/{y}{r}.png').addTo(map);

        const markers = [];
        socket.on('intel_event', (data) => {
            const feed = document.getElementById('feed');
            
            // הגבלת כמות הודעות בפיד למניעת עומס (שומר 30 אחרונות)
            if (feed.children.length > 30) feed.lastElementChild.remove();

            const card = document.createElement('div');
            card.className = 'event-card';
            card.innerHTML = `<div style="font-size:10px; opacity:0.6;">${data.time} | ${data.src}</div>
                              <div style="margin-top:4px;">${data.text}</div>`;
            feed.prepend(card);

            // יצירת נקודה על המפה (מיקום רנדומלי סביב ישראל לניטור כללי)
            const lat = 31.2 + Math.random() * 1.5;
            const lng = 34.3 + Math.random() * 1.2;
            const marker = L.circleMarker([lat, lng], { radius: 6, color: '#00ff9d', fillOpacity: 0.8 }).addTo(map);
            
            markers.push(marker);
            if (markers.length > 20) map.removeLayer(markers.shift()); // מנקה נקודות ישנות מהמפה
        });
    </script>
</body>
</html>
